<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="style.css">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link
            href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Source+Sans+3:ital,wght@0,200..900;1,200..900&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap"
            rel="stylesheet">
        <!-- #### FONT AWESOME   -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
            integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
            crossorigin="anonymous" referrerpolicy="no-referrer" />
    </head>
    <body>
        <header >
            <div class="logo"><i class="fa-solid fa-book"></i></div>
            <h1>AI BookShelf</h1>
        </header>
        <main>
            <section id="Ai-questions">
                <div class="question">
                    <p>What’s your favorite book and why?</p>
                    <textarea class="respond" id="favorite"></textarea>

                </div>
                <div class="question">
                    <p>Are you in the mood for something
                    new or a classic?</p>
                    <textarea class="respond" id="mood"></textarea>
                </div>
                <div class="question">
                    <p>Do you wanna have fun or do you want something serious?</p>
                    <textarea class="respond" id="funOrSerious"></textarea>

                </div>
                <button id="let" class="btn">Let’s Go</button>
            </section>
        </main>
        <script src="index.js" ></script>
    </body>
</html>
